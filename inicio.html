<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONOCYL | Delegación Valladolid | En Construcción</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background: linear-gradient(135deg, #FAF6F0 0%, #F5EAE1 100%);
            padding: 2rem;
        }
        .maintenance-card {
            background: #FFFFFF;
            padding: 4rem 3rem;
            border-radius: 30px;
            box-shadow: 0 12px 40px rgba(99, 45, 98, 0.08);
            max-width: 550px;
            width: 100%;
            border-top: 6px solid #D5D448;
        }
        .maintenance-logo {
            height: 70px;
            margin-bottom: 2.5rem;
            object-fit: contain;
        }
        h1 {
            color: #632D62;
            font-size: 2.4rem;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }
        p {
            color: #73676B;
            font-size: 1.25rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <img src="logo.png" alt="MONOCYL Valladolid" class="maintenance-logo">
        <h1>¡Próximamente!</h1>
        <p>Estamos preparando con mucho cariño un nuevo espacio para acompañar, informar y crear red con las familias monoparentales. Vuelve pronto.</p>
    </div>
</body>
</html>
